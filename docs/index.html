<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧡 Hermès Ethical Petition | 愛馬仕公益轉型倡議</title>
    <meta name="description" content="呼籲愛馬仕取消配貨制度，以成本價出售產品，轉型為公益奢侈品品牌">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Canvas粒子背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 主容器 -->
    <div class="container">
        <!-- 头部语言切换 -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fr">FR</button>
            <button class="lang-btn" data-lang="ja">日本語</button>
            <button class="lang-btn" data-lang="ko">한국어</button>
        </div>

        <!-- Hero区域 -->
        <header class="hero">
            <div class="hero-badge">🧡 LUXURY FOR ALL</div>
            <h1 class="hero-title" data-i18n="title">愛馬仕，是時候改變了</h1>
            <p class="hero-subtitle" data-i18n="subtitle">
                一款Birkin包成本僅$<span class="number">800</span>，售價卻高達$<span class="number">12,000</span>+，還要強制配貨。<br>
                我們呼籲：取消配貨制度，成本價出售，將奢侈品變為大眾商品。
            </p>
        </header>

        <!-- 计数器区域（动画核心） -->
        <section class="counter-section">
            <div class="counter-card">
                <div class="counter-icon">🧡</div>
                <div class="counter-number" id="supportCount">0</div>
                <div class="counter-label" data-i18n="supporters">位支持者</div>
                <button class="support-btn" id="supportBtn" data-i18n="support_btn">
                    我支持這個倡議
                </button>
                <div class="counter-note" data-i18n="one_vote">每个IP只能支持一次</div>
            </div>
        </section>

        <!-- 成本价对比 -->
        <section class="price-section">
            <h2 class="section-title" data-i18n="price_title">💰 成本價 vs 售價</h2>
            <div class="price-grid" id="priceGrid">
                <!-- JS动态生成 -->
            </div>
        </section>

        <!-- 号召文案 -->
        <section class="cta-section">
            <div class="cta-box">
                <h3 data-i18n="cta_title">🌍 让全世界听到消费者的声音</h3>
                <p data-i18n="cta_text">
                    這個網站是開源的，可以複製到其他奢侈品品牌。<br>
                    讓我們一起建立一個"人民奢侈品監督平台"。
                </p>
                <div class="cta-buttons">
                    <button class="btn-secondary" onclick="shareSite()" data-i18n="btn_share">
                        🔗 分享这个网站
                    </button>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p data-i18n="footer">© 2026 Hermès Ethical Petition | 開源倡議 | Powered by 龍蝦姬 🦞</p>
        </footer>
    </div>

    <!-- JS文件 -->
    <script src="js/i18n.js"></script>
    <script src="js/counter.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
